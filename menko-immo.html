<!-- ═══════════════════════════════════════════════════════════════════════════
     PATCH — RÉGULARISATION COMPTABLE DES ÉCARTS DE CAISSE (SYSCOHADA)
     Menko Immo v27+ · module Caisse

     Principe : la caissière constate l'écart à la clôture (déjà fait).
     Le COMPTABLE le régularise → écriture 658 (manquant) / 758 (excédent).
     Comptes paramétrables · écriture idempotente · rafraîchit balance/grand-livre.

     INTÉGRATION — 3 collages :
     1) HTML : coller <div id="caisse-ecarts-box"> dans #page-caisse,
        juste AVANT <div id="caisse-ventilation-box">.
     2) JS  : coller le bloc <script> dans le module Caisse.
     3) Dans caisseEnter(), ajouter avant caisseRenderVentilation() :
        caisseRenderEcarts();
     ═══════════════════════════════════════════════════════════════════════════ -->

<!-- ── 1) CONTENEUR (dans #page-caisse, avant #caisse-ventilation-box) ──────── -->
<div id="caisse-ecarts-box" style="margin-top:24px;"></div>


<!-- ── 2) LOGIQUE ──────────────────────────────────────────────────────────── -->
<script>
/* Comptes paramétrables (Paramètres → Caisse). Défauts SYSCOHADA. */
function _caisseCompteEcart(sens){
  var p = DATA.params || {};
  return sens === 'excedent'
    ? (p.compte_ecart_excedent || '758')   /* Produits divers — boni de caisse */
    : (p.compte_ecart_manquant || '658');  /* Charges diverses — mali de caisse */
}

/* Sessions clôturées, écart ≠ 0, non encore régularisées. */
function _caisseEcartsEnAttente(){
  return (DATA.caisse_sessions || []).filter(function(s){
    return s.statut === 'cloturee' && (parseFloat(s.ecart) || 0) !== 0 && !s.ecart_regularise;
  }).sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); });
}

function caisseRenderEcarts(){
  var box = document.getElementById('caisse-ecarts-box');
  if (!box) return;
  if (!caisseRoleAdminLike()) { box.innerHTML = ''; return; } /* comptable/manager/admin */

  var liste = _caisseEcartsEnAttente();
  if (!liste.length) { box.innerHTML = ''; return; }

  var html = '<div class="card" style="padding:16px;border-left:3px solid var(--rouge);">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;">'
      + '<div style="font-weight:800;font-size:15px;">⚖️ Écarts de caisse à régulariser</div>'
      + '<button class="btn btn-secondary btn-sm" onclick="caisseRegulariserTousEcarts()">⚡ Tout régulariser</button>'
    + '</div>'
    + '<div style="font-size:11px;color:var(--blanc-dim);margin-bottom:10px;">'
      + 'Manquant → débit <strong>'+_caisseCompteEcart('manquant')+'</strong> / crédit 571. '
      + 'Excédent → débit 571 / crédit <strong>'+_caisseCompteEcart('excedent')+'</strong>. '
      + '<span style="color:var(--or,#B87333);">Mali de caisse : charge non déductible fiscalement en CI — à justifier.</span></div>'
    + '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>'
      + '<th>Date</th><th>Caisse</th><th>Théorique</th><th>Réel compté</th><th>Écart</th><th>Sens</th><th></th>'
    + '</tr></thead><tbody>';

  liste.forEach(function(s){
    var c = (DATA.caisses||[]).find(function(x){ return x.id===s.caisse_id; });
    var ec = parseFloat(s.ecart)||0, exc = ec>0;
    html += '<tr>'
      + '<td>'+(s.date||'')+'</td>'
      + '<td>'+escHtml(c?c.nom:'')+'</td>'
      + '<td style="text-align:right;">'+fmtF(s.fond_cloture_theorique)+'</td>'
      + '<td style="text-align:right;">'+fmtF(s.fond_cloture_reel)+'</td>'
      + '<td style="text-align:right;font-weight:700;color:'+(exc?'var(--vert)':'var(--rouge)')+';">'+(exc?'+':'')+fmtF(ec)+'</td>'
      + '<td>'+(exc?'<span style="color:var(--vert);">Excédent</span>':'<span style="color:var(--rouge);">Manquant</span>')+'</td>'
      + '<td><button class="btn btn-primary btn-sm" onclick="caisseRegulariserEcart(\''+s.id+'\')">✅ Régulariser</button></td>'
    + '</tr>';
  });
  html += '</tbody></table></div></div>';
  box.innerHTML = html;
}

/* Génère l'écriture d'écart et marque la session. Idempotent. */
async function genererEcritureEcartCaisse(session){
  var ec = parseFloat(session.ecart)||0;
  if (ec === 0) return null;
  var caisse = (DATA.caisses||[]).find(function(c){ return c.id===session.caisse_id; });
  var compteCaisse = (caisse && caisse.compte) || '571';
  var exc = ec > 0;
  var contrepartie = exc ? _caisseCompteEcart('excedent') : _caisseCompteEcart('manquant');
  var libelle = (exc ? 'Excédent de caisse — ' : 'Manquant de caisse — ') + (caisse?caisse.nom:'') + ' du ' + (session.date||'');

  var ecr = {
    id: 'ecr_ecart_' + session.id, ref: 'ECART-'+(session.date||'').replace(/-/g,''),
    date: (session.date||'').slice(0,10) || today(), piece: 'ECART-'+(session.date||''),
    libelle: libelle,
    compte_debit:  exc ? compteCaisse : contrepartie,
    compte_credit: exc ? contrepartie : compteCaisse,
    compte: compteCaisse, montant: Math.abs(ec), type: exc?'produit':'charge', mode: 'especes',
    notes: 'Régularisé par ' + ((APP.currentUser&&APP.currentUser.nom)||'—'), created_at: today()
  };
  var idx = DATA.ecritures.findIndex(function(e){ return e.id===ecr.id; });
  if (idx>=0) DATA.ecritures[idx]=ecr; else DATA.ecritures.push(ecr);
  await dbPut('ecritures', ecr);
  if (typeof syncToSupabase==='function') syncToSupabase('pi_ecritures', ecr);

  session.ecart_regularise = true;
  session.ecart_ecriture_id = ecr.id;
  session.ecart_regularise_par = (APP.currentUser&&APP.currentUser.nom)||'—';
  session.ecart_regularise_le = new Date().toISOString();
  await dbPut('caisse_sessions', session);
  if (typeof syncToSupabase==='function') syncToSupabase('pi_caisse_sessions', session);
  return ecr;
}

async function caisseRegulariserEcart(sessionId){
  var s = (DATA.caisse_sessions||[]).find(function(x){ return x.id===sessionId; });
  if (!s) return;
  if (s.ecart_regularise) { toast('Écart déjà régularisé.', 'info'); return; }
  await genererEcritureEcartCaisse(s);
  if (typeof buildBalance==='function') buildBalance();
  if (typeof buildGrandLivre==='function') buildGrandLivre();
  toast('✅ Écart régularisé — écriture SYSCOHADA générée.', 'success');
  caisseRenderEcarts();
  if (typeof caisseRenderDashboard==='function') caisseRenderDashboard();
}

async function caisseRegulariserTousEcarts(){
  var liste = _caisseEcartsEnAttente();
  if (!liste.length) return;
  for (var i=0;i<liste.length;i++) await genererEcritureEcartCaisse(liste[i]);
  if (typeof buildBalance==='function') buildBalance();
  if (typeof buildGrandLivre==='function') buildGrandLivre();
  toast('⚡ '+liste.length+' écart(s) régularisé(s).', 'success');
  caisseRenderEcarts();
  if (typeof caisseRenderDashboard==='function') caisseRenderDashboard();
}
</script>
